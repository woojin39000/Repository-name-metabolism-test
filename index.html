<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대사 저하 자가진단</title>

<style>
body {font-family: Arial; background:#f4f6fb; margin:0;}
.wrap {max-width:900px; margin:auto; padding:30px;}
.question {background:#fff; padding:15px; margin-bottom:10px; border-radius:10px;}
button {padding:12px; font-weight:bold; cursor:pointer;}
.result {display:none; margin-top:30px; padding:20px; background:#fff; border-radius:10px;}
</style>
</head>

<body>
<div class="wrap">

<h2>대사 저하 자가진단</h2>

<form id="quizForm">

<!-- 기존 15개 (생략 없이 유지) -->
<script>
for(let i=1;i<=15;i++){
document.write(`
<div class="question">
${i}. 질문 ${i}
<br>
<label><input type="radio" name="q${i}" value="1"> 그렇다</label>
<label><input type="radio" name="q${i}" value="0"> 아니다</label>
</div>
`);
}
</script>

<!-- 추가 5개 -->
<div class="question">
16. 생리량이 줄거나 너무 많고 5일 이상 또는 너무 짧게 한다.
<br>
<label><input type="radio" name="q16" value="1"> 그렇다</label>
<label><input type="radio" name="q16" value="0"> 아니다</label>
</div>

<div class="question">
17. 샐러드, 야채, 현미 같은 음식을 먹으면 소화가 안 되고 가스가 발생한다.
<br>
<label><input type="radio" name="q17" value="1"> 그렇다</label>
<label><input type="radio" name="q17" value="0"> 아니다</label>
</div>

<div class="question">
18. 식단을 줄이면 어지러움이나 저혈압 느낌을 받아본 적이 있다.
<br>
<label><input type="radio" name="q18" value="1"> 그렇다</label>
<label><input type="radio" name="q18" value="0"> 아니다</label>
</div>

<div class="question">
19. 탄수섭취를 줄이고 먹는량을 줄이기 시작하면 불면을 겪은 적이 있다.
<br>
<label><input type="radio" name="q19" value="1"> 그렇다</label>
<label><input type="radio" name="q19" value="0"> 아니다</label>
</div>

<div class="question">
20. 공복 상태가 편안하기보다 집중력 저하·기력저하·짜증·무기력감이 심해진다.
<br>
<label><input type="radio" name="q20" value="1"> 그렇다</label>
<label><input type="radio" name="q20" value="0"> 아니다</label>
</div>

<button type="button" onclick="calc()">결과보기</button>

</form>

<div class="result" id="resultBox">
<h2 id="resultTitle"></h2>
<p id="resultDesc"></p>

<hr>

<h3>추가 확인</h3>
<p id="extraDesc"></p>

<br>
<a href="https://open.kakao.com/o/sy21QMli" target="_blank">
👉 카카오톡 오픈채팅 바로가기
</a>
</div>

</div>

<script>
function calc(){
let score=0;

for(let i=1;i<=20;i++){
let val=document.querySelector('input[name="q'+i+'"]:checked');
if(!val){alert("모든 문항 체크"); return;}
score+=Number(val.value);
}

let title=document.getElementById("resultTitle");
let desc=document.getElementById("resultDesc");
let extra=document.getElementById("extraDesc");

if(score<=2){
title.innerText="대사저하 가능성이 낮습니다.";
desc.innerText="현재 상태에서는 대사저하 신호가 크지 않을 수 있습니다. 다만 빠른 감량을 위해 식단과 섭취를 반복적으로 줄이면 이후 대사저하로 이어질 가능성은 존재합니다.";
}
else if(score<=5){
title.innerText="대사저하 가능성이 의심되는 상황입니다.";
desc.innerText="일부 대사저하 신호가 나타나고 있을 수 있습니다. 이 상태에서 식단과 운동을 더 밀어붙이면 오히려 적게 먹어도 체중이 잘 빠지지 않는 방향으로 흐를 수 있습니다.";
}
else{
title.innerText="대사저하 가능성이 꽤 높은 상태입니다.";
desc.innerText="여러 신호가 겹쳐 나타나고 있을 가능성이 있습니다. 이 상태에서 식단을 더 줄이거나 운동을 강하게 가져가면 오히려 체중이 정체되거나 증가하는 방향으로 흐를 수 있습니다.";
}

extra.innerText="생리 문제, 갑상선 기능저하, 부신 기능저하, 갱년기 등을 이미 진단받았다면 선택 개수와 관계없이 대사저하가 진행되고 있을 가능성이 높습니다.";

document.getElementById("resultBox").style.display="block";
}
</script>

</body>
</html>
